{{- /* Image lightbox overlay */ -}}
<div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="图片预览">
  <div class="lightbox-container">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
    <button class="lightbox-prev" id="lightboxPrev" aria-label="上一张">
      <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </button>
    <button class="lightbox-next" id="lightboxNext" aria-label="下一张">
      <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
      </svg>
    </button>
    <div class="lightbox-content">
      <img class="lightbox-image" id="lightboxImage" src="" alt="" draggable="false">
    </div>
    <div class="lightbox-counter" id="lightboxCounter">1 / 1</div>
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>
</div>
